name: DynaBeacon
version: 4.5.0
main: cl.dynasty.dynabeacon.DynaBeaconPlugin
api-version: '1.21'
author: Karuho
description: Sistema propio de beacons avanzados para Dynacraft.
softdepend: [Vault, SpawnerMeta, Towny, WorldGuard, PlotSquared, GriefPrevention, WorldEdit]

commands:
  dynabeacon:
    description: Comando principal de DynaBeacon.
    usage: /dynabeacon
    aliases: [dbeacon, beacon, dynab]

permissions:
  dynabeacon.admin:
    default: op
  dynabeacon.use:
    default: true