# ============================================================
# CONFIGURACIÓN PRINCIPAL DE NexusBeacon
# ============================================================

beacon:
  default-range: 48
  max-range: 150

  particles:
    # Activa o desactiva las partículas visuales.
    enabled: true

    # Cada cuántos ticks se dibujan.
    interval-ticks: 20

    # Cantidad de puntos usados para formar el círculo.
    # Más puntos = círculo más suave, pero más carga visual.
    radius-points: 96
    type: VILLAGER_HAPPY

  range-calculator:
    enabled: true

    # Modos:
    # FIXED       = usa default-range
    # PERCENTILE  = rango = poder * porcentaje
    # EXPONENTIAL = rango = poder^exponente
    # CLASSIFIED  = rango según tabla de poder
    mode: EXPONENTIAL

    percentile:
      min-range: 16
      percentage: 100
      max-range: 150

    exponential:
      min-range: 16
      exponent: 0.9
      max-range: 150

    classified:
      0: 16
      9: 32
      34: 48
      83: 64
      164: 96
      285: 128

  power:
    enabled: true
    max-layers: 4

    vanilla-blocks:
      IRON_BLOCK: 1
      GOLD_BLOCK: 1
      EMERALD_BLOCK: 2
      DIAMOND_BLOCK: 3
      NETHERITE_BLOCK: 4

    custom-blocks:
      COPPER_BLOCK: 1
      REDSTONE_BLOCK: 1
      LAPIS_BLOCK: 2
      AMETHYST_BLOCK: 2

item:
  material: BEACON
  display-name: "&b&lNexusBeacon"
  lore:
  - ""
  - "&8[&b+&8] &7Dueño: &f{owner}"
  - "&8[&b+&8] &7Rango: &f{range} bloques"
  - "&8[&b+&8] &7Trust: &f{trusted}"
  - ""
  - "&8[&b+&8] &7Efectos:"
  - "{effect_list}"

visual-beam:
  enabled: true

  # GLOBAL = todos usan el estilo global-style
  # PLAYER = cada beacon usa su estilo elegido por GUI
  # PLAYER_OR_GLOBAL = usa estilo del beacon si existe; si no, usa global-style
  style-mode: PLAYER_OR_GLOBAL

  # AUTO = dibuja rayo visual solo si la base usa materiales custom
  # ALWAYS = siempre dibuja rayo visual
  # CUSTOM_ONLY = solo si la base usa materiales custom
  render-mode: AUTO

  interval-ticks: 4
  height: 96
  step: 0.45
  count: 1

  custom-materials:
  - COPPER_BLOCK
  - REDSTONE_BLOCK
  - LAPIS_BLOCK
  - AMETHYST_BLOCK

  global-style:
    particle: DUST
    color: AQUA
    size: 1.2

beam-styles:
  aqua:
    name: "&bAqua"
    particle: DUST
    color: AQUA
    size: 1.2
    permission: ""

  red:
    name: "&cRojo"
    particle: DUST
    color: RED
    size: 1.2
    permission: ""

  green:
    name: "&aVerde"
    particle: DUST
    color: LIME
    size: 1.2
    permission: ""

  purple:
    name: "&dMorado"
    particle: DUST
    color: PURPLE
    size: 1.2
    permission: ""

  end_rod:
    name: "&fEnd Rod"
    particle: END_ROD
    color: NONE
    size: 1.0
    permission: ""

# ============================================================
# PROTECCIÓN
# ============================================================
protection:
  # Solo el dueño o admins pueden interactuar con el NexusBeacon.
  owner-only-interact: true

  # Solo el dueño o admins pueden romper el NexusBeacon.
  owner-only-break: true

  # Protege los bloques minerales usados como base.
  protect-base-blocks: true

# ============================================================
# BEACON VANILLA
# ============================================================
vanilla-beacon:
  # Si es true, bloquea el uso/colocación de beacons vanilla.
  disable-vanilla: false

  # Si es true, elimina o bloquea la receta vanilla del beacon.
  disable-recipe: false

# ============================================================
# RENDIMIENTO
# ============================================================
performance:
  spawner-boost:
    # Radio horizontal para buscar spawners cercanos.
    # Mantener bajo para proteger TPS.
    scan-radius: 16

    # Radio vertical para buscar spawners.
    vertical-radius: 16

    # Máximo de spawners procesados por ejecución.
    max-blocks-per-tick: 8

    # Si SpawnerMeta está activo, NexusBeacon no modifica spawners.
    # Evita conflictos con plugins que administran spawners.
    disable-when-spawnermeta-enabled: true

  crop-boost:
    scan-radius: 16
    vertical-radius: 8
    max-blocks-per-tick: 16

# ============================================================
# RECETA CUSTOM DEL NexusBeacon
# ============================================================
recipe:
  # Activa o desactiva la receta custom.
  enabled: true

  # Forma de la receta.
  shape:
  - "DDD"
  - "DBD"
  - "OOO"
  # Ingredientes usados en la forma.
  ingredients:
    B: BEACON
    D: DIAMOND_BLOCK
    O: OBSIDIAN
