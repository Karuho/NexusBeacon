# ============================================================
# MAIN NexusBeacon CONFIGURATION
# ============================================================

beacon:
  default-range: 48
  max-range: 150

  particles:
    # Enables or disables visual particles.
    enabled: true

    # How often particles are rendered.
    interval-ticks: 20

    # Amount of points used to form the circle.
    # More points = smoother circle, but more visual load.
    radius-points: 96
    type: VILLAGER_HAPPY

  range-calculator:
    enabled: true

    # Modes:
    # FIXED       = uses default-range
    # PERCENTILE  = range = power * percentage
    # EXPONENTIAL = range = power^exponent
    # CLASSIFIED  = range based on power table
    mode: EXPONENTIAL

    percentile:
      min-range: 16
      percentage: 100
      max-range: 150

    exponential:
      min-range: 16
      exponent: 0.9
      max-range: 150

    classified:
      0: 16
      9: 32
      34: 48
      83: 64
      164: 96
      285: 128

  power:
    enabled: true
    max-layers: 4

    vanilla-blocks:
      IRON_BLOCK: 1
      GOLD_BLOCK: 1
      EMERALD_BLOCK: 2
      DIAMOND_BLOCK: 3
      NETHERITE_BLOCK: 4

    custom-blocks:
      COPPER_BLOCK: 1
      REDSTONE_BLOCK: 1
      LAPIS_BLOCK: 2
      AMETHYST_BLOCK: 2
      
beacon-item:
  # If true, breaking a NexusBeacon in creative will not duplicate it.
  # Recommended: true.
  creative-no-dupe: true

  # If true, breaking a NexusBeacon with a full inventory will cancel the break.
  cancel-if-inventory-full: true

  # If true, the NexusBeacon item goes directly to the player's inventory.
  # If false, it drops naturally on the ground.
  auto-pickup: true

item:
  material: BEACON
  display-name: "%lang_item.display-name%"
  lore:
    - "%lang_item.lore%"

visual-beam:
  enabled: true

  # GLOBAL = all beacons use global-style
  # PLAYER = each beacon uses its selected GUI style
  # PLAYER_OR_GLOBAL = uses beacon style if set; otherwise uses global-style
  style-mode: PLAYER_OR_GLOBAL

  # AUTO = renders visual beam only if the base uses custom materials
  # ALWAYS = always renders visual beam
  # CUSTOM_ONLY = only renders if the base uses custom materials
  render-mode: AUTO

  interval-ticks: 4
  height: 96
  step: 0.45
  count: 1

  custom-materials:
  - COPPER_BLOCK
  - REDSTONE_BLOCK
  - LAPIS_BLOCK
  - AMETHYST_BLOCK

  global-style:
    particle: DUST
    color: AQUA
    size: 1.2

beam-styles:
  aqua:
    name: "&bAqua"
    particle: DUST
    color: AQUA
    size: 1.2
    permission: ""

  red:
    name: "&cRed"
    particle: DUST
    color: RED
    size: 1.2
    permission: ""

  green:
    name: "&aGreen"
    particle: DUST
    color: LIME
    size: 1.2
    permission: ""

  purple:
    name: "&dPurple"
    particle: DUST
    color: PURPLE
    size: 1.2
    permission: ""

  end_rod:
    name: "&fEnd Rod"
    particle: END_ROD
    color: NONE
    size: 1.0
    permission: ""

# ============================================================
# PROTECTION
# ============================================================
protection:
  # Only the owner or admins can interact with the NexusBeacon.
  owner-only-interact: true

  # Only the owner or admins can break the NexusBeacon.
  owner-only-break: true

  # Protects mineral blocks used as the beacon base.
  protect-base-blocks: true

# ============================================================
# VANILLA BEACON
# ============================================================
vanilla-beacon:
  # If true, blocks vanilla beacon placement/usage.
  disable-vanilla: false

  # If true, removes or blocks the vanilla beacon recipe.
  disable-recipe: false

# ============================================================
# PERFORMANCE
# ============================================================
performance:
  spawner-boost:
    # Horizontal radius used to search nearby spawners.
    # Keep this low to protect TPS.
    scan-radius: 16

    # Vertical radius used to search spawners.
    vertical-radius: 16

    # Maximum spawners processed per execution.
    max-blocks-per-tick: 8

    # If SpawnerMeta is enabled, NexusBeacon will not modify spawners.
    # Prevents conflicts with spawner management plugins.
    disable-when-spawnermeta-enabled: true

    # Maximum amount of blocks SpawnerBoost will scan per execution before stopping.
    # This does not limit how many spawners are boosted; that is controlled by max-blocks-per-tick.
    # Helps prevent large area scans from impacting TPS on servers with many active beacons.
    # Recommended: 1000-3000. Increase carefully depending on hardware and beacon count.
    max-scanned-blocks-per-tick: 2000

  crop-boost:
    scan-radius: 64
    vertical-radius: 8
    max-blocks-per-tick: 16
    max-scanned-blocks-per-tick: 2500

# ============================================================
# CUSTOM NexusBeacon RECIPE
# ============================================================
recipe:
  # Enables or disables the custom recipe.
  enabled: true

  # Recipe shape.
  shape:
  - "DDD"
  - "DBD"
  - "OOO"

  # Ingredients used in the recipe shape.
  ingredients:
    B: BEACON
    D: DIAMOND_BLOCK
    O: OBSIDIAN