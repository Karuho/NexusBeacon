# ============================================================
# SISTEMA DE COSTOS
# ============================================================
# Cada efecto puede usar 2 formatos de costo:
#
# 1) FORMATO SIMPLE / GLOBAL
#    Usa "costs" directamente dentro del efecto.
#    Sirve cuando quieres un costo base para adquirir y una fórmula
#    simple para mejorar.
#
#    costs:
#      acquire:       # Nivel 0 -> Nivel 1
#        options:
#          diamond:
#            type: ITEM
#            material: DIAMOND
#            amount: 5
#      upgrade:       # Nivel actual -> Nivel siguiente
#        options:
#          diamond:
#            type: ITEM
#            material: DIAMOND
#            amount-per-level: 5

#    Ejemplo:
#    - Upgrade a nivel 2 = 10 diamantes
#    - Upgrade a nivel 3 = 15 diamantes
#
# 2) FORMATO POR NIVELES (MODO AVANZADO)
#    Usa "levels.<nivel>.costs".
#    Sirve cuando cada nivel debe tener un costo exacto distinto.
#
#    levels:
#      1:
#        costs:
#          acquire:   # Nivel 0 -> Nivel 1
#            options:
#              money:
#                type: VAULT_MONEY
#                amount: 1000
#      2:
#        costs:
#          upgrade:   # Nivel 1 -> Nivel 2
#            options:
#              money:
#                type: VAULT_MONEY
#                amount: 3500
#      3:
#        costs:
#          upgrade:   # Nivel 2 -> Nivel 3
#            options:
#              money:
#                type: VAULT_MONEY
#                amount: 9000
#
# PRIORIDAD:
# - Si existe levels.<nivel>.costs.<acción>, se usa ese costo.
# - Si no existe, se usa costs.<acción> global.
# ============================================================

