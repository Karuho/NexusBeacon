    # Si SM cambia el delay base de tus spawners, ajusta este valor.
    base-delay-ticks: 650
 
    # Reducción en ticks por nivel (60 ticks = 3 segundos)
    # Nivel 1: -3 seg | Nivel 2: -6 seg | Nivel 3: -9 seg
    delay-reduction-ticks-per-level: 60
 
    # Countdown máximo permitido en ticks (180 = 9 seg)
    # Con nivel 3: 650 - 180 = 470 ticks (23.5 seg) — nunca baja de 180
    min-delay-ticks: 180
 
