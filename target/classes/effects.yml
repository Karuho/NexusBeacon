# ============================================================
# COST SYSTEM
# ============================================================
# Each effect can use 2 cost formats:
#
# 1) SIMPLE / GLOBAL FORMAT
#    Uses "costs" directly inside the effect.
#    Useful when you want a base acquisition cost and a simple
#    upgrade scaling formula.
#
#    costs:
#      acquire:       # Level 0 -> Level 1
#        options:
#          diamond:
#            type: ITEM
#            material: DIAMOND
#            amount: 5
#
#      upgrade:       # Current level -> Next level
#        options:
#          diamond:
#            type: ITEM
#            material: DIAMOND
#            amount-per-level: 5
#
#    Example:
#    - Upgrade to level 2 = 10 diamonds
#    - Upgrade to level 3 = 15 diamonds
#
# 2) LEVEL-BASED FORMAT (ADVANCED MODE)
#    Uses "levels.<level>.costs".
#    Useful when every level should have a completely custom cost.
#
#    levels:
#      1:
#        costs:
#          acquire:   # Level 0 -> Level 1
#            options:
#              money:
#                type: VAULT_MONEY
#                amount: 1000
#
#      2:
#        costs:
#          upgrade:   # Level 1 -> Level 2
#            options:
#              money:
#                type: VAULT_MONEY
#                amount: 3500
#
#      3:
#        costs:
#          upgrade:   # Level 2 -> Level 3
#            options:
#              money:
#                type: VAULT_MONEY
#                amount: 9000
#
# PRIORITY:
# - If levels.<level>.costs.<action> exists, that cost is used.
# - Otherwise, the global costs.<action> is used.
# ============================================================

