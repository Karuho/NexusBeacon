# =========================================================
# NexusBeacon GUI Configuration
# =========================================================
#
# Layout system:
#
# Each line represents one inventory row.
# Each character represents an item defined in "items".
#
# Special characters:
#
#   # = decoration / filler
#   . = empty slot
#
# Example:
#
# layout:
#   - "#########"
#   - "#.......#"
#   - "#..E.S..#"
#   - "#.......#"
#   - "#########"
#   - "####C####"
#
# Meaning:
#
#   E = effects button
#   S = settings button
#   C = close button
#
# =========================================================
# Available actions
# =========================================================
#
# close
#   Closes the current menu.
#
# open:<menu>
#   Opens another registered menu.
#
# Examples:
#
# action: "close"
# action: "open:effects"
# action: "open:main"
#
# %beam_style% = Current visual beam style
# =========================================================

titles:
  main: "%lang_gui.main.title%"
  effects: "%lang_gui.effects.title%"
  settings: "%lang_gui.settings.title%"
  trust: "%lang_gui.trust.title%"
  payment-acquire: "%lang_gui.payment.title-acquire%"
  payment-upgrade: "%lang_gui.payment.title-upgrade%"
  
menus:
  main:
    title: "%lang_gui.main.title%"

    layout:
      - "#########"
      - "#.......#"
      - "#..E.S..#"
      - "#.......#"
      - "#########"
      - "####C####"

    items:
      "#":
        material: BLACK_STAINED_GLASS_PANE
        name: " "

      E:
        material: BEACON
        name: "%lang_gui.main.effects-name%"
        lore:
          - "%lang_gui.main.effects-lore%"
        action: "open:effects"

      S:
        material: COMPARATOR
        name: "%lang_gui.main.settings-name%"
        lore:
          - "%lang_gui.main.settings-lore%"
        action: "open:settings"

      C:
        material: BARRIER
        name: "%lang_gui.common.close%"
        action: "close"

  effects:
    title: "%lang_gui.effects.title%"

    layout:
      - "#########"
      - "#EEEEEEE#"
      - "#EEEEEEE#"
      - "#EEEEEEE#"
      - "#########"
      - "####B####"

    dynamic:
      E: effects

    items:
      "#":
        material: BLACK_STAINED_GLASS_PANE
        name: " "

      B:
        material: ARROW
        name: "%lang_gui.common.back%"
        action: "open:main"

  settings:
    title: "%lang_gui.settings.title%"

    layout:
      - "#########"
      - "#.......#"
      - "#.R.P.B.#"
      - "#.T.V...#"
      - "#########"
      - "####C####"

    items:
      "#":
        material: BLACK_STAINED_GLASS_PANE
        name: " "

      R:
        material: EMERALD_BLOCK
        name: "%lang_gui.settings.range-particles-name%"
        lore:
          - "%lang_gui.settings.range-particles-lore%"
        action: "settings:toggle-range-particles"

      P:
        material: NETHER_STAR
        name: "%lang_gui.settings.range-particle-type-name%"
        lore:
          - "%lang_gui.settings.range-particle-type-lore%"
        action: "settings:cycle-range-particle"

      B:
        material: REINFORCED_DEEPSLATE
        name: "%lang_gui.settings.base-protection-name%"
        lore:
          - "%lang_gui.settings.base-protection-lore%"
        action: "settings:toggle-base-protection"

      T:
        material: NAME_TAG
        name: "%lang_gui.settings.trusted-name%"
        lore:
          - "%lang_gui.settings.trusted-lore%"
        action: "open:trust"

      V:
        material: LIGHT_BLUE_DYE
        name: "%lang_gui.settings.visual-beam-name%"
        lore:
          - "%lang_gui.settings.visual-beam-lore%"
        action: "open:beam-style"

      C:
        material: ARROW
        name: "%lang_gui.common.back%"
        lore:
          - "%lang_gui.common.back-lore%"
        action: "open:main"

  beam-style:
    title: "%lang_gui.beam-style.title%"
    layout:
      - "#########"
      - "#.......#"
      - "#.A.R.G.#"
      - "#...P...#"
      - "#########"
      - "####B####"

    items:
      "#":
        material: BLACK_STAINED_GLASS_PANE
        name: " "

      A:
        material: LIGHT_BLUE_DYE
        name: "&bAqua"
        action: "beam-style:aqua"

      R:
        material: RED_DYE
        name: "&cRed"
        action: "beam-style:red"

      G:
        material: LIME_DYE
        name: "&aGreen"
        action: "beam-style:green"

      P:
        material: PURPLE_DYE
        name: "&dPurple"
        action: "beam-style:purple"

      B:
        material: ARROW
        name: "%lang_gui.common.back%"
        action: "open:main"


  trust:
    title: "%lang_gui.trust.title%"

    layout:
      - "#########"
      - "#.......#"
      - "#.TTTTT.#"
      - "#...A...#"
      - "#########"
      - "####B####"

    dynamic:
      T: trusted

    items:
      "#":
        material: BLACK_STAINED_GLASS_PANE
        name: " "

      A:
        material: NAME_TAG
        name: "%lang_gui.trust.add-name%"
        lore:
          - "%lang_gui.trust.add-lore%"
        action: "close"

      B:
        material: ARROW
        name: "%lang_gui.common.back%"
        lore:
          - "%lang_gui.common.back-lore%"
        action: "open:settings"

  legacy:
    payment:
      slots:
        # Slot positions used by the legacy payment menu.
        # Inventory size is 27 slots (0-26).
        # Changing these values allows menu layout customization without recompiling the plugin.
        diamond: 11
        exp: 13
        money: 15
        back: 22